name: Build packages

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PKGARCH=all packages, so one target is enough; 25.12 = .apk output.
        # Target: OpenWrt 25.12.4, MediaTek filogic (e.g. Redmi AX3000T / MT7981)
        # -> package arch aarch64_cortex-a53.
        arch:
          - aarch64_cortex-a53-25.12.4
    steps:
      - uses: actions/checkout@v4

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: wgsplit
          PACKAGES: wg-split luci-app-wg-split
          V: s

      - name: Collect packages
        run: |
          mkdir -p artifacts
          find bin/ \( -name 'wg-split*.apk' -o -name 'luci-app-wg-split*.apk' \
                     -o -name 'wg-split*.ipk' -o -name 'luci-app-wg-split*.ipk' \) \
               -exec cp -v {} artifacts/ \;
          ls -l artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: artifacts/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
